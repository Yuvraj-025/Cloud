springdoc.swagger-ui.path=/
springdoc.api-docs.path=/api-docs
server.port=8080
spring.application.name=portal-service

resilience4j.circuitbreaker.instances.marksService.registerHealthIndicator=true
resilience4j.circuitbreaker.instances.marksService.slidingWindowSize=5
resilience4j.circuitbreaker.instances.marksService.minimumNumberOfCalls=1
resilience4j.circuitbreaker.instances.marksService.failureRateThreshold=50
resilience4j.circuitbreaker.instances.marksService.waitDurationInOpenState=10s
resilience4j.circuitbreaker.instances.marksService.recordExceptions=org.springframework.web.client.ResourceAccessException,java.lang.Exception

resilience4j.circuitbreaker.instances.gradeService.registerHealthIndicator=true
resilience4j.circuitbreaker.instances.gradeService.slidingWindowSize=5
resilience4j.circuitbreaker.instances.gradeService.minimumNumberOfCalls=1
resilience4j.circuitbreaker.instances.gradeService.failureRateThreshold=50
resilience4j.circuitbreaker.instances.gradeService.waitDurationInOpenState=10s
resilience4j.circuitbreaker.instances.gradeService.recordExceptions=org.springframework.web.client.ResourceAccessException,java.lang.Exception